<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Quét mã QR để bắt đầu đặt món tại bàn">
    <meta name="theme-color" content="#FF6B35">
    <title>Quét Mã QR - WebQR</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📱</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 400px;
        }

        .qr-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            font-size: 28px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        p {
            font-size: 16px;
            opacity: 0.9;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .instruction-box {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            text-align: left;
            font-size: 15px;
        }

        .step-num {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="qr-icon">📱</div>
        <h1>Quét mã QR để đặt món</h1>
        <p>Trang này chỉ có thể truy cập bằng mã QR đặt tại bàn của quán.</p>
        <div class="instruction-box">
            <div class="step">
                <div class="step-num">1</div>
                <div>Tìm mã QR trên bàn của bạn</div>
            </div>
            <div class="step">
                <div class="step-num">2</div>
                <div>Mở Camera hoặc ứng dụng quét QR</div>
            </div>
            <div class="step">
                <div class="step-num">3</div>
                <div>Quét mã → Menu sẽ tự động mở ra</div>
            </div>
        </div>
    </div>
</body>

</html>
